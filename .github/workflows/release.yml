name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: punch
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: punch
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: punch
            arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: punch
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libminiupnpc-dev

      - name: Install cross-compiler (Linux aarch64)
        if: matrix.cross == true
        run: |
          sudo sed -i 's|^Types: deb$|Types: deb\nArchitectures: amd64|' /etc/apt/sources.list.d/ubuntu.sources
          {
            echo "Types: deb"
            echo "URIs: http://ports.ubuntu.com/ubuntu-ports/"
            echo "Suites: noble noble-updates noble-security noble-backports"
            echo "Components: main restricted universe multiverse"
            echo "Architectures: arm64"
            echo "Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg"
          } | sudo tee /etc/apt/sources.list.d/arm64.sources >/dev/null
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libminiupnpc-dev:arm64

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install miniupnpc

      - name: Build (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          VERSION: ${{ github.ref_name }}
        run: make VERSION="$VERSION"

      - name: Build (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          VERSION: ${{ github.ref_name }}
        run: make CC=aarch64-linux-gnu-gcc VERSION="$VERSION"

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make CC="clang -arch x86_64" VERSION="$VERSION"
          else
            make VERSION="$VERSION"
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/punch dist/punch
          tar -czf dist/${{ matrix.binary_name }}-${{ matrix.target }}.tar.gz -C dist punch
          rm dist/punch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: punch-${{ matrix.target }}
          path: dist/${{ matrix.binary_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
